# =============================================================================
# Kanban + LINE Mini App — Nginx Virtual Host
# Proxmox + LXC Deployment
#
# Replace the placeholders below with your actual values before copying to
# the proxy LXC:
#   ${APP_DOMAIN}       → e.g. kanban.yourdomain.com
#   ${BFF_HOST}         → IP of kanban-bff LXC, e.g. 10.0.10.12
#   ${PLANKA_HOST}      → IP of kanban-planka LXC, e.g. 10.0.10.11
#   ${LIFF_DIST_PATH}   → /var/www/liff
# =============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name ${APP_DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name ${APP_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${APP_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${APP_DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header Referrer-Policy           "strict-origin"    always;

    # CORS for LIFF origin
    set $cors_origin "";
    if ($http_origin ~* "^https://(liff\.line\.me|.*\.vercel\.app)$") {
        set $cors_origin $http_origin;
    }

    # --- LIFF static files ---
    location /app/ {
        alias ${LIFF_DIST_PATH}/;
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-cache";
    }

    # --- BFF API ---
    location /bff/ {
        limit_req zone=api_limit burst=20 nodelay;

        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Max-Age       86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://${BFF_HOST}:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- BFF auth — stricter rate limit ---
    location /bff/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://${BFF_HOST}:3000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- iCal feed (no auth header, token is in URL) ---
    location ~ ^/bff/calendar/.+/feed\.ics$ {
        proxy_pass         http://${BFF_HOST}:3000/calendar/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header Cache-Control "max-age=300, public";
    }

    # --- Planka WebSocket ---
    location /socket.io/ {
        proxy_pass         http://${PLANKA_HOST}:1337/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # --- Planka web (direct — desktop fallback) ---
    location / {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass         http://${PLANKA_HOST}:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
